<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- Site-wide favicon: teal face, orange-gold ring + bull halo.
         The SVG favicon points directly at app-icon.svg so the design
         stays in sync with every other icon variant (PWA tile, apple-
         touch, OG cards) — all rendered from the same SVG via
         scripts/build_app_icons.py. -->
    <link rel="icon" type="image/svg+xml" href="%sveltekit.assets%/app-icon.svg?v=32" />
    <link rel="alternate icon" href="%sveltekit.assets%/favicon.ico?v=32" />
    <link rel="alternate icon" href="%sveltekit.assets%/favicon.png?v=32" />
    <link rel="manifest" href="%sveltekit.assets%/manifest.webmanifest?v=32" />

    <!-- SEO & Metadata for RamboQuant Analytics LLP -->
    <title>RamboQuant Analytics</title>
    <meta name="description" content="RamboQuant Analytics LLP – Your partner for active returns in the Indian stock markets." />
    <meta name="keywords" content="RamboQuant Analytics, investments, trading, finance, Indian stock market, stocks, derivatives, ETFs" />
    <meta name="author" content="RamboQuant Analytics LLP" />
    <meta name="robots" content="index, follow" />
    <meta name="google-site-verification" content="Gxa9sHLYv2meW1M0lk9U9YmPZLpLA25yY7whTUBPjU0" />

    <!-- ── Site-wide social-share fallback (slice AW) ────────────────
         Per-page <svelte:head> overrides these on routes that have
         richer narrative. For every other route — algo pages,
         deep-link surfaces, anything that ships without explicit OG
         — these tags ensure the brand identity (logo, name, slogan,
         link preview image) renders in any social card unfurl:
         Facebook, LinkedIn, Twitter/X, Slack, Discord, Telegram,
         WhatsApp, iMessage, Reddit, Pinterest, Mastodon — all read
         these tags. The image is the canonical 1200×630 share card.
    -->
    <meta property="og:site_name"          content="RamboQuant Analytics" />
    <meta property="og:title"              content="RamboQuant Analytics — Quantitative Investment for Indian Markets" />
    <meta property="og:description"        content="Systematic, transparent portfolios + open algo trading platform. 25-year track record, 22%+ XIRR." />
    <meta property="og:url"                content="https://ramboq.com/" />
    <meta property="og:type"               content="website" />
    <meta property="og:locale"             content="en_IN" />
    <meta property="og:image"              content="https://ramboq.com/og-image-home.png?v=2" />
    <meta property="og:image:secure_url"   content="https://ramboq.com/og-image-home.png?v=2" />
    <meta property="og:image:type"         content="image/png" />
    <meta property="og:image:width"        content="1200" />
    <meta property="og:image:height"       content="630" />
    <meta property="og:image:alt"          content="RamboQuant Analytics brand mark — teal bull inside a champagne-gold ring on a dark teal background." />

    <!-- Twitter / X — same data, twitter:* namespace. summary_large_image
         renders the full 1200×630 image; other platforms ignore these. -->
    <meta name="twitter:card"              content="summary_large_image" />
    <meta name="twitter:site"              content="@ramboquant" />
    <meta name="twitter:title"             content="RamboQuant Analytics — Quantitative Investment for Indian Markets" />
    <meta name="twitter:description"       content="Systematic, transparent portfolios + open algo trading platform. 25-year track record, 22%+ XIRR." />
    <meta name="twitter:image"             content="https://ramboq.com/og-image-home.png?v=2" />
    <meta name="twitter:image:alt"         content="RamboQuant Analytics brand mark — teal bull inside a champagne-gold ring on a dark teal background." />

    <!-- Canonical and OG tags are injected per page via <svelte:head>
         in each route — those overrides win over the fallback above
         on every route that supplies them. -->

    <!-- Structured Data (JSON-LD) — Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "RamboQuant Analytics LLP",
      "url": "https://ramboq.com",
      "logo": "https://ramboq.com/app-icon-512.png",
      "description": "Expert investing and trading strategies in the Indian stock markets.",
      "foundingDate": "2024",
      "email": "ramboquant@gmail.com",
      "address": {
        "@type": "PostalAddress",
        "addressCountry": "IN",
        "addressLocality": "Mumbai",
        "addressRegion": "Maharashtra"
      },
      "contactPoint": {
        "@type": "ContactPoint",
        "email": "ramboquant@gmail.com",
        "contactType": "customer service",
        "areaServed": "IN",
        "availableLanguage": "English"
      },
      "sameAs": []
    }
    </script>

    <!-- Structured Data (JSON-LD) — WebSite (no potentialAction: /search not implemented) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "url": "https://ramboq.com",
      "name": "RamboQuant Analytics"
    }
    </script>

    <!-- Theme color — matches manifest background_color + icon face teal -->
    <meta name="theme-color" content="#114858" />

    <!-- apple-touch-icon explicit version pin so iOS re-fetches when icons change -->
    <link rel="apple-touch-icon" sizes="192x192" href="%sveltekit.assets%/apple-touch-icon.png?v=32" />

    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover" class="bg-bg text-text">
    <div id="svelte">%sveltekit.body%</div>
  </body>
</html>
