<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <pattern id="stripe" width="56" height="56" patternUnits="userSpaceOnUse" patternTransform="rotate(135)">
      <line x1="0" y1="0" x2="0" y2="56" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#c8a84b"/>
      <stop offset="50%" stop-color="#f0d070"/>
      <stop offset="100%" stop-color="#c8a84b"/>
    </linearGradient>
    <!-- 3D bevel for the icon ring (top bright → mid amber → deep) -->
    <linearGradient id="ringBevel" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#fde68a"/>
      <stop offset="35%"  stop-color="#fbbf24"/>
      <stop offset="65%"  stop-color="#d4920c"/>
      <stop offset="100%" stop-color="#7c2d12"/>
    </linearGradient>
    <radialGradient id="dishShade" cx="50%" cy="40%" r="60%">
      <stop offset="60%" stop-color="#0d1829" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.45"/>
    </radialGradient>
    <filter id="ringShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.55"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0c1830"/>
  <rect width="1200" height="630" fill="url(#stripe)"/>

  <!-- Champagne accent bars (mirror site pub-accent rail) -->
  <rect x="0" y="0"   width="1200" height="6" fill="url(#goldGrad)"/>
  <rect x="0" y="624" width="1200" height="6" fill="url(#goldGrad)"/>

  <!-- Ringed-bull mark on the left — same visual grammar as
       app-icon.svg so the link-preview brand recognition matches the
       installed PWA icon and the Google Search brand badge. -->
  <g transform="translate(315,315)">
    <!-- Inset navy disk (recessed face inside the ring) -->
    <circle r="240" fill="#0d1829"/>
    <circle r="234" fill="url(#dishShade)"/>
    <!-- 3D beveled gold ring -->
    <circle r="234" fill="none" stroke="url(#ringBevel)" stroke-width="14"
            filter="url(#ringShadow)"/>
    <!-- Inner highlight for polished-metal sheen -->
    <circle r="227" fill="none" stroke="rgba(255,236,160,0.55)" stroke-width="1"/>

    <!-- Simplified bull head silhouette inside the ring (champagne gold).
         Sized so it stays comfortably within the inner edge (~220 px). -->
    <g transform="translate(0,12) scale(1.65)">
      <!-- Head -->
      <ellipse cx="0" cy="0" rx="52" ry="44" fill="#c8a84b"/>
      <!-- Left horn -->
      <path d="M-36,-28 Q-90,-90 -60,-110 Q-40,-70 -22,-34" fill="#c8a84b"/>
      <!-- Right horn -->
      <path d="M36,-28 Q90,-90 60,-110 Q40,-70 22,-34" fill="#c8a84b"/>
      <!-- Eyes -->
      <circle cx="-18" cy="-8" r="5" fill="#0c1830"/>
      <circle cx="18"  cy="-8" r="5" fill="#0c1830"/>
      <!-- Nose -->
      <ellipse cx="0" cy="18" rx="18" ry="12" fill="#b8922e"/>
      <circle cx="-7" cy="18" r="4" fill="#0c1830"/>
      <circle cx="7"  cy="18" r="4" fill="#0c1830"/>
      <!-- Ears -->
      <ellipse cx="-56" cy="4" rx="14" ry="10" fill="#b8922e" transform="rotate(-20 -56 4)"/>
      <ellipse cx="56"  cy="4" rx="14" ry="10" fill="#b8922e" transform="rotate(20 56 4)"/>
    </g>
  </g>

  <!-- Wordmark on the right (left-aligned to keep the icon as the
       focal element on narrow link-preview crops). -->
  <text x="640" y="290"
        font-family="'Trebuchet MS', Arial, sans-serif"
        font-size="78" font-weight="900"
        text-anchor="start"
        fill="url(#goldGrad)"
        letter-spacing="2">RamboQuant</text>
  <text x="640" y="350"
        font-family="'Trebuchet MS', Arial, sans-serif"
        font-size="42" font-weight="700"
        text-anchor="start"
        fill="rgba(240,220,180,0.92)"
        letter-spacing="1">Analytics</text>

  <!-- Champagne divider -->
  <line x1="640" y1="385" x2="1080" y2="385" stroke="#c8a84b" stroke-width="1.5" stroke-opacity="0.55"/>

  <!-- Tagline -->
  <text x="640" y="430"
        font-family="'Trebuchet MS', Arial, sans-serif"
        font-size="26" font-weight="500"
        text-anchor="start"
        fill="rgba(240,220,180,0.82)"
        letter-spacing="1">
    Quantitative Investment for Indian Markets
  </text>
  <text x="640" y="475"
        font-family="'Trebuchet MS', Arial, sans-serif"
        font-size="18" font-weight="500"
        text-anchor="start"
        fill="rgba(200,168,75,0.75)"
        letter-spacing="5">
    INVEST · GROW · COMPOUND
  </text>

  <!-- URL watermark -->
  <text x="640" y="555"
        font-family="'Trebuchet MS', Arial, sans-serif"
        font-size="16" font-weight="400"
        text-anchor="start"
        fill="rgba(200,216,240,0.55)"
        letter-spacing="2">
    ramboq.com
  </text>
</svg>
