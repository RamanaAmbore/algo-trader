<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <pattern id="stripe" width="56" height="56" patternUnits="userSpaceOnUse" patternTransform="rotate(135)">
      <line x1="0" y1="0" x2="0" y2="56" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#f59410"/>
      <stop offset="50%" stop-color="#ffd848"/>
      <stop offset="100%" stop-color="#f59410"/>
    </linearGradient>
    <filter id="bull-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="22" result="halo-bloom-blur"/>
      <feFlood flood-color="#f59410" result="halo-bloom-color"/>
      <feComposite in="halo-bloom-color" in2="halo-bloom-blur" operator="in" result="halo-bloom-raw"/>
      <feComponentTransfer in="halo-bloom-raw" result="halo-bloom">
        <feFuncA type="linear" slope="0.70"/>
      </feComponentTransfer>
      <feGaussianBlur in="SourceAlpha" stdDeviation="7" result="halo-mid-blur"/>
      <feFlood flood-color="#ffd848" result="halo-mid-color"/>
      <feComposite in="halo-mid-color" in2="halo-mid-blur" operator="in" result="halo-mid-raw"/>
      <feComponentTransfer in="halo-mid-raw" result="halo-mid">
        <feFuncA type="linear" slope="0.90"/>
      </feComponentTransfer>
      <feMorphology in="SourceAlpha" operator="dilate" radius="1" result="dil-inner"/>
      <feGaussianBlur in="dil-inner" stdDeviation="2.5" result="halo-inner-blur"/>
      <feFlood flood-color="#ffd848" result="halo-inner-color"/>
      <feComposite in="halo-inner-color" in2="halo-inner-blur" operator="in" result="halo-inner-raw"/>
      <feComponentTransfer in="halo-inner-raw" result="halo-inner">
        <feFuncA type="linear" slope="0.85"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="halo-bloom"/>
        <feMergeNode in="halo-mid"/>
        <feMergeNode in="halo-inner"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="face-radial" cx="50%" cy="50%" r="55%">
      <stop offset="0%"   stop-color="#14525e"/>
      <stop offset="100%" stop-color="#0c1830"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="#0c1830"/>
  <rect width="1200" height="630" fill="url(#stripe)"/>
  <rect x="0" y="0"   width="1200" height="6" fill="url(#goldGrad)"/>
  <rect x="0" y="624" width="1200" height="6" fill="url(#goldGrad)"/>
  <!-- Face circle behind the bull — radial teal gradient, soft-glow
       container that matches the app-icon-512 face. -->
  <circle cx="600" cy="315" r="260" fill="url(#face-radial)"/>
  <!-- Bull silhouette, scaled up to fill the larger ring (r=240 vs
       sub-page r=130). Cream outline + teal body, with the standard
       gold halo filter. -->
  <image x="434" y="149" width="332" height="332"
         href="data:image/png;base64," filter="url(#bull-glow)"/>
  <!-- Uniform metallic-gold ring with subtle bevel rims for 3D. -->
  <circle cx="600" cy="315" r="247" fill="none"
          stroke="#ffd848" stroke-width="2" opacity="0.85"/>
  <circle cx="600" cy="315" r="240" fill="none"
          stroke="#f59410" stroke-width="26"/>
  <circle cx="600" cy="315" r="232" fill="none"
          stroke="#ffd848" stroke-width="2" opacity="0.85"/>
</svg>
