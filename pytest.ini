[pytest]
# pytest configuration for RamboQuant backend tests

testpaths = backend/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

asyncio_mode = auto

# Markers for test categorization
markers =
    integration: marks tests as integration tests (use -m "not integration" to skip)
    unit: marks tests as unit tests
    asyncio: marks tests as async (handled by pytest-asyncio)

addopts =
    -v
    --tb=short
    --strict-markers

# Ignore these files
norecursedirs = .git .venv venv frontend node_modules __pycache__ .pytest_cache
