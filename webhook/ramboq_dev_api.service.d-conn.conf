# Systemd drop-in for ramboq_dev_api.service — wires dev to the SAME
# UDS as prod so dev doesn't open its own broker sessions.
#
# Operator: "can dev domain use the same broker connection. That way
# dev does not need to open parallel connections."
#
# Result with this drop-in installed:
#   • Dev's broker reads/writes hop to /tmp/ramboq_conn.sock (owned
#     by prod's ramboq_conn.service).
#   • No second login flow on dev — Kite/Dhan/Groww tokens minted
#     ONCE per host, shared across prod + dev requests.
#   • Dev's /admin/brokers becomes read-mostly — mutations land in
#     the prod broker_accounts table because conn_service uses prod's
#     DB (ramboq, not ramboq_dev).
#
# Install (one-time on server):
#   sudo mkdir -p /etc/systemd/system/ramboq_dev_api.service.d
#   sudo cp /opt/ramboq/webhook/ramboq_dev_api.service.d-conn.conf \
#           /etc/systemd/system/ramboq_dev_api.service.d/conn.conf
#   sudo systemctl daemon-reload
#   sudo systemctl restart ramboq_dev_api
[Service]
Environment=RAMBOQ_USE_CONN_SERVICE=1
Environment=RAMBOQ_CONN_SOCK=/tmp/ramboq_conn.sock
