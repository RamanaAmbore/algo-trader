# Systemd drop-in for ramboq_api.service / ramboq_dev_api.service.
#
# Install:
#   sudo mkdir -p /etc/systemd/system/ramboq_api.service.d
#   sudo cp /opt/ramboq/webhook/ramboq_api.service.d-conn.conf \
#           /etc/systemd/system/ramboq_api.service.d/conn.conf
#   sudo systemctl daemon-reload
#   sudo systemctl restart ramboq_api
#
# (Repeat with ramboq_dev_api.service.d for the dev instance so dev
# also routes through the shared conn_service UDS instead of holding
# its own broker connections.)
#
# Roll back: rm the drop-in, systemctl daemon-reload, restart.
[Service]
Environment=RAMBOQ_USE_CONN_SERVICE=1
