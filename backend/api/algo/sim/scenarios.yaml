# Market-simulation scenarios for /api/simulator/*.
#
# Positions-only simulator. Holdings are NOT simulated — we only exercise
# F&O positions + fund-negative conditions, because that's where intraday
# risk lives. Agents that check holdings metrics (day_pct, day_rate_abs,
# day_rate_pct) run against live production data only; the synthesizer
# will refuse to build a scenario for them.
#
# Each scenario declares:
#   slug          — stable id referenced by the UI + API
#   mode          — 'symbol' (default) | 'aggregate' (legacy)
#   market_state  — OPTIONAL presets for the simulated clock & segment
#                    flags. Keys:
#                      preset: one of pre_open | at_open | mid_session |
#                              pre_close | at_close | post_close | expiry_day
#                      Or explicit overrides:
#                        nse_open / mcx_open (bool)
#                        minutes_since_nse_open / minutes_since_nse_close (int)
#                        is_expiry_day (bool)
#                    Defaults to preset=mid_session when absent.
#   initial:      — optional per-symbol rows (not needed when seed=live)
#   ticks:        — list of {at, moves} entries; moves are pct / abs /
#                   random_walk / target_pnl / set_margin
#
# Glob syntax is `section.account.tradingsymbol`. `*` matches one segment,
# `**` matches any remaining path. All scenarios below target
# `positions.**` so they apply uniformly to whatever positions exist.

# ─────────────────────────────────────────────────────────────────────────
# Generic crash — modest DOWN moves. Hurts long positions.
# ─────────────────────────────────────────────────────────────────────────
- slug: generic-crash
  name: Generic crash (-1% / -2% / -3% positions)
  mode: symbol
  market_state: {preset: mid_session}
  description: >-
    Three-tick drawdown on positions. Fires the static % and ₹ floors on
    long-heavy books; rate rules fire once the bleed is sustained.
  ticks:
    - at: 0
      moves:
        - {type: pct, scope: "positions.**", value: -0.01}
    - at: 1
      moves:
        - {type: pct, scope: "positions.**", value: -0.01}
    - at: 2
      moves:
        - {type: pct, scope: "positions.**", value: -0.01}

# ─────────────────────────────────────────────────────────────────────────
# Generic euphoria — modest UP moves. Hurts SHORT positions (short options,
# short futures). Mirror of generic-crash.
# ─────────────────────────────────────────────────────────────────────────
- slug: generic-euphoria
  name: Generic euphoria (+1% / +2% / +3% positions)
  mode: symbol
  market_state: {preset: mid_session}
  description: >-
    Three-tick rally on positions. Shorts (short options, short futures)
    lose money here — catches the stress cases the crash scenario misses.
  ticks:
    - at: 0
      moves:
        - {type: pct, scope: "positions.**", value: 0.01}
    - at: 1
      moves:
        - {type: pct, scope: "positions.**", value: 0.01}
    - at: 2
      moves:
        - {type: pct, scope: "positions.**", value: 0.01}

# ─────────────────────────────────────────────────────────────────────────
# Extreme crash — large DOWN moves. Fires every loss agent with room to
# spare. Useful for worst-case stress testing and confirming the action
# layer (chase_close_positions, cancel_all, etc.) reacts correctly.
# ─────────────────────────────────────────────────────────────────────────
- slug: extreme-crash
  name: Extreme crash (-3% / -6% / -10% positions)
  mode: symbol
  market_state: {preset: mid_session}
  description: >-
    Three-tick catastrophic drawdown. Trips per-account AND total floors,
    static AND rate rules, on a long-heavy book. Use it to exercise the
    whole alert chain at once.
  ticks:
    - at: 0
      moves:
        - {type: pct, scope: "positions.**", value: -0.03}
    - at: 1
      moves:
        - {type: pct, scope: "positions.**", value: -0.06}
    - at: 2
      moves:
        - {type: pct, scope: "positions.**", value: -0.10}

# ─────────────────────────────────────────────────────────────────────────
# Extreme euphoria — mirror of extreme-crash. Large UP move; crushes a
# short-heavy book.
# ─────────────────────────────────────────────────────────────────────────
- slug: extreme-euphoria
  name: Extreme euphoria (+3% / +6% / +10% positions)
  mode: symbol
  market_state: {preset: mid_session}
  description: >-
    Three-tick explosive rally. Short F&O books take severe losses.
    Mirror stress test to extreme-crash.
  ticks:
    - at: 0
      moves:
        - {type: pct, scope: "positions.**", value: 0.03}
    - at: 1
      moves:
        - {type: pct, scope: "positions.**", value: 0.06}
    - at: 2
      moves:
        - {type: pct, scope: "positions.**", value: 0.10}

# ─────────────────────────────────────────────────────────────────────────
# Wild swings — high volatility with alternating direction. Stresses
# positions in BOTH directions in quick succession, catching rules that
# rely on consistent drift plus catching risky short-gamma exposures.
# ─────────────────────────────────────────────────────────────────────────
- slug: wild-swings
  name: Wild swings (+5% / -8% / +12% — editable)
  mode: symbol
  market_state: {preset: mid_session}
  description: >-
    Alternating-direction volatility over three ticks. Default swings
    are +5% / -8% / +12%; override any of the three from the
    simulator page before Start. Long and short positions both take
    hits somewhere in the sequence.
  ticks:
    - at: 0
      moves:
        - {type: pct, scope: "positions.**", value:  0.05}
    - at: 1
      moves:
        - {type: pct, scope: "positions.**", value: -0.08}
    - at: 2
      moves:
        - {type: pct, scope: "positions.**", value:  0.12}

# ─────────────────────────────────────────────────────────────────────────
# Random walk — drift-with-vol stress on positions. Useful for
# "does anything fire that I didn't expect?" over 30+ ticks.
# ─────────────────────────────────────────────────────────────────────────
- slug: random-walk
  name: Random walk (drift down, vol 0.5%)
  mode: symbol
  seed: 42
  description: >-
    Geometric random walk on every position: drift -0.1%/tick, vol 0.5%.
    Seeded so two runs at the same scenario produce identical moves.
    Pair with seed_mode=live to shake your real book.
  ticks:
    - at: 0
      moves:
        - {type: random_walk, scope: "positions.**", drift: -0.001, vol: 0.005}

# ─────────────────────────────────────────────────────────────────────────
# Underlying-driven crash — moves NIFTY spot, lets BS re-price every option
# coherently. Compare with `generic-crash` (which moves each contract by a
# flat %) to see realistic gamma + skew effects on a hedged F&O book.
# ─────────────────────────────────────────────────────────────────────────
- slug: nifty-down-3pct
  name: NIFTY underlying -3% (BS re-priced)
  mode: symbol
  market_state: {preset: mid_session}
  description: >-
    Drives NIFTY spot down -1% / -2% / -3% over three ticks. Every NIFTY
    option re-prices via Black-Scholes using the IV calibrated at sim
    start; futures track spot 1:1. Seed live (or live+scenario) so the
    re-pricing runs against your real strikes + premiums.
  ticks:
    - at: 0
      moves:
        - {type: underlying_pct, scope: "underlying.NIFTY", value: -0.01}
    - at: 1
      moves:
        - {type: underlying_pct, scope: "underlying.NIFTY", value: -0.01}
    - at: 2
      moves:
        - {type: underlying_pct, scope: "underlying.NIFTY", value: -0.01}

# ─────────────────────────────────────────────────────────────────────────
# Underlying-driven gap-up — same shape, opposite direction. Useful for
# squeezing short-call books (sees premium balloon, vega pain).
# ─────────────────────────────────────────────────────────────────────────
- slug: nifty-up-3pct
  name: NIFTY underlying +3% (BS re-priced)
  mode: symbol
  market_state: {preset: mid_session}
  description: >-
    NIFTY spot +1% / +2% / +3% over three ticks. Black-Scholes re-prices
    every NIFTY option using calibrated IV. Stresses short-call writers
    and naked short-strangle books.
  ticks:
    - at: 0
      moves:
        - {type: underlying_pct, scope: "underlying.NIFTY", value: 0.01}
    - at: 1
      moves:
        - {type: underlying_pct, scope: "underlying.NIFTY", value: 0.01}
    - at: 2
      moves:
        - {type: underlying_pct, scope: "underlying.NIFTY", value: 0.01}

# ─────────────────────────────────────────────────────────────────────────
# Underlying random walk — drives NIFTY spot through a GBM path. Every
# option re-prices coherently via Black-Scholes off the new spot each
# tick. Best long-running stress scenario: the operator can dial drift
# and vol from the UI (walk_drift / walk_vol on /start) to land on any
# regime — calm sideways, trending bull, trending bear, high-vol chop.
#
# This is THE recommended scenario for end-to-end agent testing: pair
# with seed_mode=live to exercise your real book under a realistic
# market path.
# ─────────────────────────────────────────────────────────────────────────
- slug: nifty-random-walk
  name: NIFTY random walk (BS re-priced)
  mode: symbol
  seed: 42
  market_state: {preset: mid_session}
  description: >-
    GBM walk on NIFTY spot: drift -0.05%/tick, vol 0.3%/tick by default.
    Every NIFTY option re-prices via Black-Scholes each tick using the
    IV calibrated at sim start. Override drift / vol / seed from the UI
    to dial bull / bear / chop regimes without editing this file.
  ticks:
    - at: 0
      moves:
        - {type: underlying_random_walk, scope: "underlying.NIFTY",
           drift: -0.0005, vol: 0.003}

# ─────────────────────────────────────────────────────────────────────────
# Gap-down open — single big tick at session open, then walk. Drives the
# opening gap that's a real morning pattern. Pair with at_open market
# state so rate agents start their baseline gate at the open clock.
# ─────────────────────────────────────────────────────────────────────────
- slug: nifty-gap-down-3pct
  name: NIFTY gap-down -3% at open
  mode: symbol
  seed: 42
  market_state: {preset: at_open}
  description: >-
    Single -3% gap on NIFTY at session open (tick 0), then a calm
    GBM walk for the next 4 ticks. Use to test agents that fire on
    opening-gap conditions plus the 15-min baseline gate behaviour
    (rate agents should stay silent through tick 0, then catch the
    sustained walk).
  ticks:
    - at: 0
      moves:
        - {type: underlying_pct, scope: "underlying.NIFTY", value: -0.03}
    - at: 1
      moves:
        - {type: underlying_random_walk, scope: "underlying.NIFTY",
           drift: -0.0002, vol: 0.002}
    - at: 2
      moves:
        - {type: advance_clock, minutes: 5}
        - {type: underlying_random_walk, scope: "underlying.NIFTY",
           drift: -0.0002, vol: 0.002}

# ─────────────────────────────────────────────────────────────────────────
# Gap-up open — mirror of gap-down. Crushes short-call books.
# ─────────────────────────────────────────────────────────────────────────
- slug: nifty-gap-up-3pct
  name: NIFTY gap-up +3% at open
  mode: symbol
  seed: 42
  market_state: {preset: at_open}
  description: >-
    Single +3% gap on NIFTY at session open, then a calm walk.
    Stresses short-call writers; vega pain on short premium.
  ticks:
    - at: 0
      moves:
        - {type: underlying_pct, scope: "underlying.NIFTY", value: 0.03}
    - at: 1
      moves:
        - {type: underlying_random_walk, scope: "underlying.NIFTY",
           drift: 0.0002, vol: 0.002}
    - at: 2
      moves:
        - {type: advance_clock, minutes: 5}
        - {type: underlying_random_walk, scope: "underlying.NIFTY",
           drift: 0.0002, vol: 0.002}

# ─────────────────────────────────────────────────────────────────────────
# Regime switch — calm sideways for 5 ticks, then a violent 3-tick
# crash. Tests whether rate-history-dependent agents stay silent during
# the calm phase and fire only during the crash. Phase 1 / Phase 2 are
# annotated for the LogPanel.
# ─────────────────────────────────────────────────────────────────────────
- slug: regime-switch
  name: Regime switch (calm → crash)
  mode: symbol
  seed: 42
  market_state: {preset: mid_session}
  description: >-
    Phase 1 (ticks 0–4): calm sideways walk, drift 0, vol 0.1%. No
    agent should fire. Phase 2 (ticks 5–7): catastrophic -3% / -6% /
    -10% moves. Sustained-loss rate agents catch the regime change.
  ticks:
    - at: 0
      phase: calm
      moves:
        - {type: random_walk, scope: "positions.**", drift: 0.0, vol: 0.001}
    - at: 1
      phase: calm
      moves:
        - {type: random_walk, scope: "positions.**", drift: 0.0, vol: 0.001}
    - at: 2
      phase: calm
      moves:
        - {type: random_walk, scope: "positions.**", drift: 0.0, vol: 0.001}
    - at: 3
      phase: calm
      moves:
        - {type: random_walk, scope: "positions.**", drift: 0.0, vol: 0.001}
    - at: 4
      phase: calm
      moves:
        - {type: random_walk, scope: "positions.**", drift: 0.0, vol: 0.001}
    - at: 5
      phase: crash
      moves:
        - {type: pct, scope: "positions.**", value: -0.03}
    - at: 6
      phase: crash
      moves:
        - {type: pct, scope: "positions.**", value: -0.06}
    - at: 7
      phase: crash
      moves:
        - {type: pct, scope: "positions.**", value: -0.10}

# ─────────────────────────────────────────────────────────────────────────
# IV crush — flatten implied vol on every NIFTY option, then move spot.
# Test agents that gate on option premium decay specifically (not just
# spot moves).
# ─────────────────────────────────────────────────────────────────────────
- slug: nifty-iv-crush
  name: NIFTY IV crush (σ → 0.10) + small spot drift
  mode: symbol
  seed: 42
  market_state: {preset: mid_session}
  description: >-
    Hard IV reset to 10% across every NIFTY option (vega shock), then
    a small calm walk on spot. Long-premium books bleed even with the
    spot barely moving. Pair with seed_mode=live to see your real
    NIFTY chain repriced under crushed vol.
  ticks:
    - at: 0
      moves:
        - {type: set_iv, scope: "positions.*.NIFTY*", value: 0.10}
        - {type: underlying_random_walk, scope: "underlying.NIFTY",
           drift: 0.0, vol: 0.001}
    - at: 1
      moves:
        - {type: underlying_random_walk, scope: "underlying.NIFTY",
           drift: 0.0, vol: 0.001}

# ═════════════════════════════════════════════════════════════════════════
#  Eight named regimes for iteration-mode sweeps. These are the canonical
#  presets the /admin/simulator iteration framework runs across. They all
#  use underlying-driven moves (Black-Scholes re-prices options off spot)
#  so the operator's real F&O positions track coherently — pair every
#  one with seed_mode=live or live+scenario.
# ═════════════════════════════════════════════════════════════════════════

- slug: gap-up
  name: Gap up open (+1%)
  mode: symbol
  market_state: {preset: at_open}
  description: >-
    +1% gap on every underlying at open, then 4 calm flat ticks. Tests
    short-call books and rate-agent baseline behaviour through the gap.
  ticks:
    - at: 0
      moves:
        - {type: underlying_pct, scope: "underlying.*", value: 0.01}
    - at: 1
      moves: []
    - at: 2
      moves:
        - {type: advance_clock, minutes: 5}
    - at: 3
      moves: []
    - at: 4
      moves: []

- slug: extreme-gap-up
  name: Extreme gap up (+5%, vol crush)
  mode: symbol
  market_state: {preset: at_open}
  description: >-
    +5% gap on every underlying at open + skewed IV crush. ATM IV down
    30 vol points, OTM calls down LESS (deep OTM still bid for upside
    chase), OTM puts down MORE (further OTM than before the gap).
    Models a positive-surprise where vol-of-vol drops asymmetrically.
    Catastrophic for naked short-call writers.
  ticks:
    - at: 0
      moves:
        - {type: underlying_pct, scope: "underlying.*", value: 0.05}
        - {type: set_iv_skew,    scope: "positions.**",
           atm_delta: -0.30, put_skew: -0.50, call_skew: -0.10}
    - at: 1
      moves: []
    - at: 2
      moves:
        - {type: advance_clock, minutes: 5}
    - at: 3
      moves: []
    - at: 4
      moves: []

- slug: upward-trending
  name: Upward trending (+0.05%/tick over 20 ticks)
  mode: symbol
  seed: 42
  market_state: {preset: mid_session}
  description: >-
    Steady drift up across 20 ticks with low realised vol — a calm bull
    grind. Tests whether trending-day P&L correctly accumulates without
    spurious agent fires from short-window noise.
  ticks:
    - at: 0
      moves:
        - {type: underlying_random_walk, scope: "underlying.*",
           drift: 0.0005, vol: 0.001}

- slug: downward-trending
  name: Downward trending (-0.05%/tick over 20 ticks)
  mode: symbol
  seed: 42
  market_state: {preset: mid_session}
  description: >-
    Mirror of upward-trending — steady bear grind. Useful for testing
    rate agents that should catch sustained pressure WITHOUT firing on
    every micro tick.
  ticks:
    - at: 0
      moves:
        - {type: underlying_random_walk, scope: "underlying.*",
           drift: -0.0005, vol: 0.001}

- slug: minor-volatility
  name: Minor volatility (drift 0, vol 0.3%/tick)
  mode: symbol
  seed: 42
  market_state: {preset: mid_session}
  description: >-
    Sideways chop with modest realised vol. No agent should fire under
    this regime — it's the "control" scenario for false-positive
    detection.
  ticks:
    - at: 0
      moves:
        - {type: underlying_random_walk, scope: "underlying.*",
           drift: 0.0, vol: 0.003}

- slug: major-volatility
  name: Major volatility (drift 0, vol 1%/tick)
  mode: symbol
  seed: 42
  market_state: {preset: mid_session}
  description: >-
    High-vol sideways chop. Long-premium books bleed less than under
    IV crush but slow-drag the P&L. Short-premium writers should NOT
    profit cleanly — vega + gamma whipsaws hit both sides.
  ticks:
    - at: 0
      moves:
        - {type: underlying_random_walk, scope: "underlying.*",
           drift: 0.0, vol: 0.01}

- slug: gap-down
  name: Gap down open (-1%)
  mode: symbol
  market_state: {preset: at_open}
  description: >-
    -1% gap on every underlying at open, then 4 calm flat ticks.
    Mirror of gap-up. Tests long-put / short-call book reactions.
  ticks:
    - at: 0
      moves:
        - {type: underlying_pct, scope: "underlying.*", value: -0.01}
    - at: 1
      moves: []
    - at: 2
      moves:
        - {type: advance_clock, minutes: 5}
    - at: 3
      moves: []
    - at: 4
      moves: []

- slug: pre-close
  name: Pre-close squeeze (last 15 min of NSE)
  mode: symbol
  seed: 42
  market_state: {preset: pre_close}
  description: >-
    Final 15 minutes of NSE session — typically thin liquidity, MTM
    panic, and short-covering / closing-auction spikes. The simulated
    clock starts at 15:15 IST (15 min to close). Volatility ramps:
    calm 0.1% σ for ticks 0-2, climbs through 0.3% (3-5), peaks at
    0.8% during the closing rush (6-8), then settles. Tests how
    agents that have been silent through the day react to the
    pre-close storm.
  ticks:
    - at: 0
      moves:
        - {type: underlying_random_walk, scope: "underlying.*",
           drift: -0.0002, vol: 0.001}
    - at: 1
      moves:
        - {type: advance_clock, minutes: 2}
        - {type: underlying_random_walk, scope: "underlying.*",
           drift: 0.0, vol: 0.001}
    - at: 2
      moves:
        - {type: advance_clock, minutes: 3}
        - {type: underlying_random_walk, scope: "underlying.*",
           drift: 0.0, vol: 0.003}
    - at: 3
      moves:
        - {type: advance_clock, minutes: 2}
        - {type: underlying_random_walk, scope: "underlying.*",
           drift: 0.0, vol: 0.003}
    - at: 4
      moves:
        - {type: advance_clock, minutes: 2}
        - {type: underlying_random_walk, scope: "underlying.*",
           drift: -0.0005, vol: 0.005}
    - at: 5
      moves:
        - {type: advance_clock, minutes: 2}
        - {type: underlying_random_walk, scope: "underlying.*",
           drift: 0.0, vol: 0.008}
    - at: 6
      moves:
        - {type: advance_clock, minutes: 1}
        - {type: underlying_random_walk, scope: "underlying.*",
           drift: 0.0, vol: 0.008}
    - at: 7
      moves:
        - {type: advance_clock, minutes: 2}
        - {type: underlying_random_walk, scope: "underlying.*",
           drift: 0.0005, vol: 0.005}

- slug: extreme-gap-down
  name: Extreme gap down (-5%, vol spike)
  mode: symbol
  market_state: {preset: at_open}
  description: >-
    -5% gap on every underlying at open + skewed IV spike. ATM IV +30
    vol points, OTM puts +80 (deep OTM puts get bid up hardest in
    panic — classic crashing-skew shape), OTM calls only +40. Models
    a panic-fear morning realistically: puts get hosed UP, the
    underlying crashes, naked short-put writers take catastrophic hits.
  ticks:
    - at: 0
      moves:
        - {type: underlying_pct, scope: "underlying.*", value: -0.05}
        - {type: set_iv_skew,    scope: "positions.**",
           atm_delta: 0.30, put_skew: 0.50, call_skew: 0.10}
    - at: 1
      moves: []
    - at: 2
      moves:
        - {type: advance_clock, minutes: 5}
    - at: 3
      moves: []
    - at: 4
      moves: []

# ─────────────────────────────────────────────────────────────────────────
# Holdings stress — drives the day P&L on every holding down 1% / 2% / 3%.
# Tests the day_pct / day_rate_abs / day_rate_pct agents that previously
# could only run against live data (positions-only sim restriction lifted).
# ─────────────────────────────────────────────────────────────────────────
- slug: holdings-stress
  name: Holdings -1% / -2% / -3% (day-change agents)
  mode: symbol
  market_state: {preset: mid_session}
  description: >-
    Three-tick drawdown on holdings. Pair with seed_mode=live to drag
    the real holdings book through a coordinated day-change. Fires
    day_pct (static %), day_rate_abs (₹/min), and day_rate_pct (%/min)
    floors on a long-equity book.
  ticks:
    - at: 0
      moves:
        - {type: pct, scope: "holdings.**", value: -0.01}
    - at: 1
      moves:
        - {type: pct, scope: "holdings.**", value: -0.01}
    - at: 2
      moves:
        - {type: pct, scope: "holdings.**", value: -0.01}

# ─────────────────────────────────────────────────────────────────────────
# Generic IV crush — second-order vega test that works on any book.
# Unlike nifty-iv-crush (NIFTY-only), this resets IV across every option
# on every underlying, so iteration-mode sweeps can include it without
# requiring a specific underlying in the seed book.
# ─────────────────────────────────────────────────────────────────────────
- slug: iv-crush
  name: IV crush (σ → 0.10 across all options)
  mode: symbol
  seed: 42
  market_state: {preset: mid_session}
  description: >-
    Hard IV reset to 10% on every option in the book (vega shock), then
    a small calm walk on each underlying. Tests long-premium agents
    that gate on option decay rather than spot moves. Pair with
    seed_mode=live to see the operator's real chain reprice under
    crushed vol.
  ticks:
    - at: 0
      moves:
        - {type: set_iv, scope: "positions.*.*", value: 0.10}
        - {type: underlying_random_walk, scope: "underlying.*",
           drift: 0.0, vol: 0.001}
    - at: 1
      moves:
        - {type: underlying_random_walk, scope: "underlying.*",
           drift: 0.0, vol: 0.001}
    - at: 2
      moves:
        - {type: advance_clock, minutes: 5}
